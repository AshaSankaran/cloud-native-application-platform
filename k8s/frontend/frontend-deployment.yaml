apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: cloud-native-app  
spec: 
  replicas: 2
  selector:
    matchLabels:
      app: frontend 
  template:
    metadata: 
      labels: 
        app: frontend 
    spec: 
      containers: 
        - name: frontend-container
          image: ashasankaran/cloud-native-frontend:v1
          imagePullPolicy: ifNotPresent
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi" 
          ports: 
            - containerPort: 80 
