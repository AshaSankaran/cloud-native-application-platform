services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: platformdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  backend:
    build: ./Backend
    ports:
      - "8080:5000"
    environment:
      DB_HOST: postgres
      DB_NAME: platformdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
    depends_on:
      - postgres
  frontend:
    build: ./Frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
volumes:
  postgres-data: 