name: Cloud Native CI/CD Pipeline
on:
  push: 
    branches:
      - main
  workflow_dispatch: 
env:
  IMAGE_TAG: ${{github.run_number}}
jobs:
  build-and-push: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 
      - name: Build Backend Image
        run: |
          docker build \
            -t cloud-native-backend:${{ env.IMAGE_TAG }} \
            ./backend
      - name: Build Frontend Image
        run: |
          docker build \
            -t cloud-native-frontend:${{ env.IMAGE_TAG }} \
            ./frontend
      - name: Build PostgreSQL Image
        run: |
          docker build \
            -t cloud-native-postgres:${{ env.IMAGE_TAG }} \
            ./database
      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with: 
          image-ref: cloud-native-backend:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cloud-native-frontend:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan PostgreSQL Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cloud-native-postgres:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-postgres.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: |
            trivy-backend.sarif
            trivy-frontend.sarif
            trivy-postgres.sarif