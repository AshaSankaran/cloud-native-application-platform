name: Cloud Native CI/CD Pipeline
on:
  push: 
    branches:
      - main
  workflow_dispatch: 
env:
  IMAGE_TAG: ${{github.run_number}}
jobs:
  build-and-deploy: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 
      - name: Show Current Directory
        run: pwd 
      - name: List Repository Files
        run: ls -la 
      - name: Show Project Structure
        run: tree -L 2 
      - name: Check Docker Version
        run: docker --version 
      - name: Build Frontend Docker Image 
        run: docker build -t ashasankaran/cloud-native-frontend:$IMAGE_TAG ./frontend 
      - name: Tag Frontend Docker Image
        run: docker tag ashasankaran/cloud-native-frontend:$IMAGE_TAG ashasankaran/cloud-native-frontend:latest
      - name: Verify Frontend Docker Image
        run: docker images
      - name: Login to Docker Hub 
        uses: docker/login-action@v3 
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_TOKEN}}
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6 
        with: 
          context: ./backend
          push: true
          tags: |
            ashasankaran/cloud-native-backend:${{env.IMAGE_TAG}}
            ashasankaran/cloud-native-backend:latest
      - name: Push Frontend Image to Docker Hub
        run: docker push ashasankaran/cloud-native-frontend:$IMAGE_TAG
      - name: Push Frontend Latest Image 
        run: docker push ashasankaran/cloud-native-frontend:latest