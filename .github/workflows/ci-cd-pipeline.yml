name: Cloud Native CI/CD Pipeline
on:
  push: 
    branches:
      - main
  workflow_dispatch: 
jobs:
  build-and-deploy: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Show Current Directory
        run: pwd 
      - name: List Repository Files
        run: ls -la 
      - name: Show Project Structure
        run: tree -L 2 
      - name: Check Docker Version
        run: docker --version 
      - name: Build Backend Docker Image
        run: docker build -t ashasankaran/cloud-native-backend:v1 ./backend
      - name: Verify Backend Docker Image
        run: docker images 
      - name: Build Frontend Docker Image 
        run: docker build -t ashasankaran/cloud-native-frontend:v1 ./frontend 
      - name: Verify Frontend Docker Image
        run: docker images
      - name: Login to Docker Hub 
        uses: docker/login-action@v3 
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_TOKEN}}
      - name: Push Backend Image to Docker Hub
        run: docker push ashasankaran/cloud-native-backend:v1 
      - name: Push Frontend Image to Docker Hub
        run: docker push ashasankaran/cloud-native-frontend:v1